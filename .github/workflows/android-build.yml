name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Fetch scratch-gui assets
      run: |
        echo "Fetching assets from 02engine/scratch-gui:cf-pages..."
        # 深度克隆分支到临时目录
        git clone --depth 1 --branch cf-pages https://github.com/02engine/scratch-gui.git temp_assets
        # 确保 www 目录存在
        mkdir -p www
        # 将所有资产同步到 www 目录（排除 .git 目录）
        rsync -av --exclude='.git/' temp_assets/ www/
        # 清理临时目录
        rm -rf temp_assets
        echo "Assets synchronized to www/"

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Install npm dependencies
      run: npm ci
    
    - name: Setup Android SDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

    # 此时 npx cap sync 会将刚才拉取到 www 的内容同步到 Android 项目中
    - name: Build Capacitor Android
      run: npx cap sync android
    
    - name: Build Debug APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Setup Release Signing
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          cd android/app
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        fi
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    
    - name: Build Release APK
      working-directory: android
      run: |
        chmod +x gradlew
        if [ -n "$KEYSTORE_PASSWORD" ]; then
          ./gradlew assembleRelease \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_PASSWORD="$KEY_PASSWORD"
        else
          ./gradlew assembleRelease
        fi
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
    
    - name: Upload AAB (Release)
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 30