name: Android Build

on:
  repository_dispatch:
    types: [publish-android]  # 接收触发事件
  workflow_dispatch:          # 保留手动触发用于调试

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 提取并处理 Tag
    - name: Prepare Version String
      id: prep
      run: |
        # 获取 client_payload 中的 tag，如果没有则设定一个 fallback 值
        RAW_TAG="${{ github.event.client_payload.tag }}"
        if [ -z "$RAW_TAG" ]; then RAW_TAG="v0.0.0"; fi
        
        # 去掉开头的 v
        CLEAN_TAG="${RAW_TAG#v}"
        
        echo "clean_tag=$CLEAN_TAG" >> $GITHUB_OUTPUT
        echo "raw_tag=$RAW_TAG" >> $GITHUB_OUTPUT
        echo "Processing version: $RAW_TAG -> $CLEAN_TAG"

    - name: Fetch scratch-gui assets
      run: |
        git clone --depth 1 --branch cf-page https://github.com/02engine/scratch-gui.git temp_assets
        mkdir -p www
        rsync -av --exclude='.git/' temp_assets/ www/
        rm -rf temp_assets

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Install npm dependencies
      run: npm ci
    
    - name: Setup Android SDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

    - name: Build Capacitor Android
      run: npx cap sync android
    
    - name: Setup Release Signing
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          cd android/app
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        fi
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    
    - name: Build Release APK
      working-directory: android
      run: |
        chmod +x gradlew
        if [ -n "$KEYSTORE_PASSWORD" ]; then
          ./gradlew assembleRelease \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_PASSWORD="$KEY_PASSWORD"
        else
          ./gradlew assembleRelease
        fi
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # 2. 重命名 APK
    - name: Rename APK
      run: |
        OLD_PATH="android/app/build/outputs/apk/release/app-release.apk"
        NEW_NAME="02Engine-Android-${{ steps.prep.outputs.clean_tag }}.apk"
        mv "$OLD_PATH" "$NEW_NAME"
        echo "renamed_path=$NEW_NAME" >> $GITHUB_OUTPUT
        echo "apk_name=$NEW_NAME" >> $GITHUB_OUTPUT
      id: rename

    # 3. 上传到 02engine/desktop 的 Release 中
    - name: Upload APK to Desktop Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.ORG_DISPATCH_TOKEN }} # 需要有对 desktop 仓库写权限的 Token
        repo_name: 02engine/desktop                  # 目标仓库
        file: ${{ steps.rename.outputs.apk_name }}   # 重命名后的文件
        asset_name: ${{ steps.rename.outputs.apk_name }}
        tag: ${{ steps.prep.outputs.raw_tag }}       # 指定上传到哪个 Tag 下（带v的原始tag）
        overwrite: true

    - name: Upload Artifact (Backup)
      uses: actions/upload-artifact@v4
      with:
        name: 02engine-android-apk
        path: ${{ steps.rename.outputs.apk_name }}
        retention-days: 7